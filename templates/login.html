{% extends 'base.html' %}

{% block content %}
<div class="card glass" style="max-width: 400px; margin: 4rem auto;">
    <h2 style="text-align: center; margin-bottom: 2rem;">Log In</h2>
    
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <div style="position: relative;">
                <input type="password" name="password" id="loginPassword" class="form-control" required style="padding-right: 2.5rem;">
                <button type="button" onclick="togglePassword()" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: gray; font-size: 1.2rem; filter: grayscale(100%); opacity: 0.7;">
                    👁️
                </button>
            </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Log In</button>
    </form>
    
    <div style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary);">
        <p style="margin-top: 1.5rem;">Don't have an account? <a href="{% url 'register' %}" style="color: var(--accent-primary); font-weight: 600;">Register here</a></p>
    </div>
</div>

<script>
function togglePassword() {
    const pwd = document.getElementById('loginPassword');
    if (pwd.type === 'password') {
        pwd.type = 'text';
    } else {
        pwd.type = 'password';
    }
}
</script>
{% endblock %}
