{% extends 'base.html' %}

{% block content %}
<div class="card glass" style="max-width: 600px; margin: 2rem auto;">
    <h2 style="margin-bottom: 2rem;">Create Assignment</h2>
    
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">Task Title</label>
            <input type="text" name="title" class="form-control" placeholder="e.g. History of the Internet" required>
        </div>
        <div class="form-group">
            <label class="form-label">Task Type</label>
            <select name="activity_type" class="form-control" required>
                <option value="assignment">Assignment</option>
                <option value="quiz">Quiz</option>
                <option value="activity">Activity</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">Due Date and Time</label>
            <input type="datetime-local" name="due_date" class="form-control" required>
        </div>
        <div class="form-group">
            <label class="form-label">Instructions / Description</label>
            <textarea name="description" class="form-control" rows="5" required></textarea>
        </div>
        <div class="form-group">
            <label class="form-label">Attachment (Optional)</label>
            <input type="file" name="file" class="form-control">
        </div>
        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
            <button type="submit" class="btn btn-primary" style="flex: 1;">Create</button>
            <a href="{% url 'course_detail' course.id %}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
