{% extends 'base.html' %}

{% block content %}
<div class="card glass" style="max-width: 600px; margin: 2rem auto;">
    <h2 style="margin-bottom: 2rem;">Upload Material</h2>
    
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">Title</label>
            <input type="text" name="title" class="form-control" placeholder="e.g. Chapter 1 PDF" required>
        </div>
        <div class="form-group">
            <label class="form-label">File</label>
            <input type="file" name="file" class="form-control" style="padding: 0.5rem;" required>
        </div>
        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
            <button type="submit" class="btn btn-primary" style="flex: 1;">Upload</button>
            <a href="{% url 'course_detail' course.id %}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
