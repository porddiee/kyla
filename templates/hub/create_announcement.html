{% extends 'base.html' %}

{% block content %}
<div class="card glass" style="max-width: 600px; margin: 2rem auto;">
    <h2 style="margin-bottom: 2rem;">Post Announcement</h2>
    
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">Title</label>
            <input type="text" name="title" class="form-control" placeholder="e.g. Test Tomorrow!" required>
        </div>
        <div class="form-group">
            <label class="form-label">Content</label>
            <textarea name="content" class="form-control" rows="5" placeholder="Details..." required></textarea>
        </div>
        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
            <button type="submit" class="btn btn-primary" style="flex: 1;">Post</button>
            <a href="{% url 'course_detail' course.id %}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
